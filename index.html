function haversine(a,b){
  const R=6371, r=x=>x*Math.PI/180;
  const dLat=r(b.lat-a.lat), dLng=r(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function reistijdMin(km){ if(km<0.5) return 0; const v = km<15?38 : km<40?52 : 63; return km/v*60+6; }
const eur = n => "€ "+n.toLocaleString("nl-NL",{maximumFractionDigits:0});
const eur2 = n => "€ "+n.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function standaardGrondstof(l){
  if(state.tab==="lossen-grond") return l.vervuild?"Grond (vervuild)":"Grond (schoon)";
  if(state.tab==="lossen-grind") return l.vervuild?"Grind (vervuild)":"Grind 16/32 (schoon)";
  if(state.tab==="lossen-slib") return "RKG-slib";
  if(state.tab==="lossen-bouwafval") return "Isolatieparels";
  return "";
}

function asnTekst(l){
  const g = asnData.grondstof || standaardGrondstof(l);
  const onderwerp = "Aanvraag afvalstroomnummer (ASN) - "+METHORST.naam;
  const regels = [
    "Geachte heer/mevrouw,",
    "",
    "Hierbij vragen wij een afvalstroomnummer (ASN) aan voor het aanleveren van materiaal op uw locatie "+l.naam+" te "+l.plaats+".",
    "",
    "GEGEVENS AFVALSTROOM",
    "Afvalstof / materiaal: "+g,
    "Geschatte hoeveelheid: "+state.ton+" "+(l.m3?"m³":"ton"),
    "Locatie van herkomst (werklocatie): "+asnData.werk,
    "",
    "ONTDOENER",
    METHORST.naam,
    METHORST.adres,
    METHORST.pc,
    "KvK: "+METHORST.kvk,
    "BTW: "+METHORST.btw,
    "",
    "TRANSPORTEUR",
    METHORST.naam+" (eigen vervoer)",
    "VIHB-nummer: "+METHORST.vihb,
    "Voertuig: "+((VOERTUIGEN.find(v=>v.id===state.voertuig)||VOERTUIGEN[0]).label),
    "Kenteken voertuig: "+asnData.kenteken.toUpperCase(),
    "",
    "CONTACT",
    "Tel: "+METHORST.tel,
    "E-mail: "+METHORST.mail,
    "Facturen: "+METHORST.mailFacturen,
    "",
    "Graag ontvangen wij het afvalstroomnummer zo spoedig mogelijk, zodat onze chauffeur kan lossen.",
    "",
    "Met vriendelijke groet,",
    METHORST.naam,
    METHORST.tel
  ];
  return { onderwerp, tekst: regels.join("\n") };
}

function valideerAsn(){
  const fouten = [];
  if(!asnData.werk.trim()) fouten.push("werk");
  if(!asnData.kenteken.trim()) fouten.push("kenteken");
  return fouten;
}

function vraagGps(){
  const knop=document.getElementById("gpsknop"), fout=document.getElementById("gpsfout");
  knop.textContent="…"; fout.style.display="none";
  const klaar=()=>{ knop.textContent="◎ GPS"; };
  const toonFout=(msg)=>{ klaar(); fout.textContent=msg; fout.style.display="block"; render(); };
  if(!window.isSecureContext){
    toonFout("GPS werkt alleen via een beveiligde https-link (bijv. jouw github.io-adres). Kies hieronder een plaats.");
    return;
  }
  if(!navigator.geolocation){
    toonFout("Deze browser ondersteunt geen GPS. Kies hieronder een plaats.");
    return;
  }
  const ok=p=>{ state.pos={lat:p.coords.latitude,lng:p.coords.longitude}; klaar();
    document.getElementById("startpunt").value="GPS — huidige locatie"; render(); };
  const fail=e=>{
    if(e && e.code===1) toonFout("Locatietoestemming geweigerd. Zet locatie aan voor deze site (slotje naast het webadres → Rechten → Locatie) en probeer opnieuw, of kies een plaats.");
    else toonFout("GPS-signaal niet gevonden. Zet locatie (GPS) aan op je telefoon en probeer opnieuw, of kies een plaats.");
  };
  // Eerste poging nauwkeurig, tweede poging sneller/globaler
  navigator.geolocation.getCurrentPosition(ok, ()=>{
    navigator.geolocation.getCurrentPosition(ok, fail, {enableHighAccuracy:false, timeout:20000, maximumAge:600000});
  }, {enableHighAccuracy:true, timeout:10000});
}

function init(){
  const vt=document.getElementById("voertuigen");
  VOERTUIGEN.forEach(v=>{
    const b=document.createElement("button"); b.textContent=v.label; b.dataset.id=v.id;
    b.onclick=()=>{ state.voertuig=v.id; render(); };
    vt.appendChild(b);
  });
  const tabs=document.getElementById("tabs");
  TABS.forEach(t=>{
    const b=document.createElement("button"); b.textContent=t.label;
    b.onclick=()=>{ state.tab=t.id; state.open=null; state.asnOpen=null; render(); };
    b.dataset.id=t.id; tabs.appendChild(b);
  });
  const sel=document.getElementById("startpunt");
  const ph=document.createElement("option"); ph.textContent="Waar sta je nu?"; ph.disabled=true; ph.selected=true; ph.value=""; sel.appendChild(ph);
  STARTPUNTEN.forEach(s=>{ const o=document.createElement("option"); o.value=s.naam; o.textContent=s.naam; sel.appendChild(o); });
  sel.onchange=()=>{
    const s=STARTPUNTEN.find(x=>x.naam===sel.value); if(!s) return;
    if(s.gps){ vraagGps(); return; }
    state.pos={lat:s.lat,lng:s.lng}; render();
  };
  document.getElementById("gpsknop").onclick=vraagGps;
  document.getElementById("tonmin").onclick=()=>{ state.ton=Math.max(1,state.ton-1); render(); };
  document.getElementById("tonplus").onclick=()=>{ state.ton++; render(); };
  document.getElementById("retour").onclick=()=>{ state.retour=!state.retour; render(); };
  const sc=document.getElementById("sorteerchips");
  [["goedkoopst","Goedkoopst totaal"],["dichtstbij","Dichtstbij"]].forEach(([v,l])=>{
    const b=document.createElement("button"); b.className="chip"; b.textContent=l; b.dataset.v=v;
    b.onclick=()=>{ state.sorteer=v; render(); }; sc.appendChild(b);
  });
  const vc=document.getElementById("vervuildchips");
  [["schoon","Schoon"],["vervuild","Vervuild"],["alles","Alles"]].forEach(([v,l])=>{
    const b=document.createElement("button"); b.className="chip"; b.textContent=l; b.dataset.v=v;
    b.onclick=()=>{ state.vervuild=v; render(); }; vc.appendChild(b);
  });
  vraagGps();
  render();
}

function render(){
  document.querySelectorAll("#voertuigen button").forEach(b=>b.classList.toggle("actief",b.dataset.id===state.voertuig));
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("actief",b.dataset.id===state.tab));
  document.querySelectorAll("#sorteerchips .chip").forEach(b=>b.classList.toggle("aan",b.dataset.v===state.sorteer));
  document.querySelectorAll("#vervuildchips .chip").forEach(b=>b.classList.toggle("aan",b.dataset.v===state.vervuild));
  document.getElementById("vervuildchips").style.display = state.tab==="lossen-grind" ? "flex" : "none";
  document.getElementById("tonw").textContent = state.ton+" t";
  const r=document.getElementById("retour");
  r.classList.toggle("aan",state.retour);
  r.textContent=(state.retour?"✓ ":"")+"Retour meerekenen";

  const main=document.getElementById("lijst");
  if(!state.pos){ main.innerHTML='<div class="leeg">Kies een startpunt of gebruik GPS.</div>'; return; }

  let items=LOCATIES.filter(l=>l.cat===state.tab);
  if(state.tab==="lossen-grind"){
    if(state.vervuild==="schoon") items=items.filter(l=>!l.vervuild);
    if(state.vervuild==="vervuild") items=items.filter(l=>l.vervuild);
  }
  const uurtarief = (VOERTUIGEN.find(v=>v.id===state.voertuig)||VOERTUIGEN[0]).tarief;
  const rijen=items.map(l=>{
    const km=haversine(state.pos,l)*1.3;
    const tijd=reistijdMin(km);
    const transport=tijd/60*uurtarief*(state.retour?2:1);
    const stort=l.prijs!=null?l.prijs*state.ton:null;
    const aanvoerKosten=l.aanvoer!=null?l.aanvoer*state.ton:null;
    const totaal=stort!=null?transport+stort+(aanvoerKosten||0):null;
    const oudTarief = !l.bron && !l.eigen && l.prijs!=null;
    return {...l,km,tijd,transport,stort,aanvoerKosten,totaal,oudTarief};
  });
  rijen.sort((a,b)=>{
    // Gecheckte bedrijven (factuurbron) altijd boven oude-lijst-tarieven
    if(a.oudTarief!==b.oudTarief) return a.oudTarief?1:-1;
    if(state.sorteer==="dichtstbij") return a.km-b.km;
    if(a.totaal==null&&b.totaal==null) return a.km-b.km;
    if(a.totaal==null) return 1;
    if(b.totaal==null) return -1;
    return a.totaal-b.totaal;
  });

  const isLossen=state.tab.startsWith("lossen");
  const kostLabel=isLossen?"Storten":"Materiaal";

  main.innerHTML = rijen.map((l,i)=>{
    const top = i===0 && state.sorteer==="goedkoopst" && l.totaal!=null;
    const open = state.open===i;
    const badges =
      (top?'<span class="badge b-top">GOEDKOOPST</span>':"")+
      (l.eigen?'<span class="badge b-eigen">EIGEN TERREIN</span>':"")+
      (l.oudTarief?'<span class="badge b-oud">OUD TARIEF</span>':"")+
      (l.vervuild?'<span class="badge b-verv">VERVUILD</span>':"")+
      (l.trechter?'<span class="badge b-tre">TRECHTER</span>':"");
    const perton = l.prijs!=null ? l.prijs+(l.aanvoer||0) : null;
    const prijsblok = l.totaal!=null
      ? '<div class="totaal'+(top?" groen":"")+'">'+eur(l.totaal)+'</div><div class="perton">'+eur2(perton)+'/'+(l.m3?'m³':'t')+'</div>'
      : '<div class="onbekend">prijs<br>onbekend</div>';
    let detail="";
    if(open){
      let asnBlok="";
      if(isLossen && !l.noAsn){
        if(state.asnOpen===i){
          const g = asnData.grondstof || standaardGrondstof(l);
          asnBlok = '<div class="asn">'
            +'<h4>ASN AANVRAGEN</h4>'
            +'<p class="uitleg">Vul in en verstuur — ontdoener en transporteur (Methorst, incl. VIHB) worden automatisch meegestuurd. Planning ontvangt automatisch een cc.</p>'
            +'<label for="asn-werk">Werklocatie (herkomst)</label>'
            +'<input id="asn-werk" placeholder="Bijv. Hoofdstraat 12, Ede" value="'+esc(asnData.werk)+'">'
            +'<label for="asn-kent">Kenteken voertuig</label>'
            +'<input id="asn-kent" placeholder="Bijv. BX-HN-81" autocapitalize="characters" value="'+esc(asnData.kenteken)+'">'
            +'<label for="asn-grond">Soort grondstof / afvalstof</label>'
            +'<select id="asn-grond">'+GRONDSTOFFEN.map(x=>'<option'+(x===g?" selected":"")+'>'+esc(x)+'</option>').join("")+'</select>'
            +'<label>Standaard mail (vult automatisch mee)</label>'
            +'<div class="preview" id="asn-preview"></div>'
            +'<div class="foutmelding" id="asn-fout" style="display:none">Vul eerst werklocatie en kenteken in.</div>'
            +(state.kopieOk?'<div class="gelukt">✓ Aanvraag gekopieerd — plak in mail of WhatsApp</div>':"")
            +'<div class="acties">'
            +'<button class="actie" id="asn-mail">✉ Mail openen</button>'
            +'<button class="actie lijn" id="asn-kopieer">⧉ Kopieer</button>'
            +'</div></div>';
        } else {
          asnBlok = '<div class="acties" style="margin-top:8px"><button class="actie lijn" id="asn-open">📄 ASN aanvragen</button></div>';
        }
      }
      detail='<div class="detail"><div class="bk">'
        +'<div class="bkr"><span>Transport '+esc((VOERTUIGEN.find(v=>v.id===state.voertuig)||VOERTUIGEN[0]).label.toLowerCase())+' '+(state.retour?"(retour)":"(enkele reis)")+'</span><span>'+eur(l.transport)+'</span></div>'
        +(l.stort!=null?'<div class="bkr"><span>'+kostLabel+' — '+state.ton+' '+(l.m3?'m³':'t')+' × '+eur2(l.prijs)+'</span><span>'+eur(l.stort)+'</span></div>':"")
        +(l.aanvoer!=null?'<div class="bkr"><span>'+esc(l.aanvoerlabel||"Aanvoer")+' — '+state.ton+' '+(l.m3?'m³':'t')+' × '+eur2(l.aanvoer)+'</span><span>'+eur(l.aanvoerKosten)+'</span></div>':"")
        +'<div class="bkr bkt"><span>Totaal</span><span>'+(l.totaal!=null?eur(l.totaal):"—")+'</span></div></div>'
        +'<div class="adres">'+esc(l.adres)+'</div>'
        +(l.mail?'<div class="soortnote">✉ '+esc(l.mail)+'</div>':"")
        +(l.soort?'<div class="soortnote">Soort: '+esc(l.soort)+'</div>':"")
        +'<div class="acties">'
        +'<a class="actie" target="_blank" rel="noreferrer" href="https://www.google.com/maps/dir/?api=1&destination='+l.lat+','+l.lng+'&travelmode=driving">▸ Navigeer</a>'
        +(l.tel?'<a class="actie lijn" href="tel:'+esc(l.tel)+'">✆ Bellen</a>':"")
        +'</div>'+asnBlok+'</div>';
    }
    return '<article class="kaart'+(top?" top":"")+'">'
      +'<button class="kop" data-i="'+i+'">'
      +'<div style="min-width:0;flex:1"><div class="badges">'+badges+'</div>'
      +'<div class="naam">'+esc(l.naam)+'</div>'
      +'<div class="plaats">'+esc(l.plaats)+' · '+Math.round(l.km)+' km · ± '+Math.round(l.tijd)+' min</div></div>'
      +'<div class="prijsblok">'+prijsblok+'</div></button>'+detail+'</article>';
  }).join("")
  +'<p class="voetnoot">Reistijd is een schatting voor vrachtverkeer (hemelsbreed × 1,3, gem. 38–63 km/u). Transportkosten worden berekend op basis van reistijd en het gekozen voertuig'+(state.retour?" (× 2 retour)":"")+'. Coördinaten zijn geschat op adres — controleer bij eerste bezoek.</p>';

  main.querySelectorAll(".kop").forEach(b=>{
    b.onclick=()=>{ const i=+b.dataset.i; state.open = state.open===i?null:i; state.asnOpen=null; state.kopieOk=false; render(); };
  });

  // ASN handlers
  const rij = state.open!=null ? rijen[state.open] : null;
  const openKnop=document.getElementById("asn-open");
  if(openKnop) openKnop.onclick=()=>{ state.asnOpen=state.open; state.kopieOk=false; render(); };
  const wI=document.getElementById("asn-werk"), kI=document.getElementById("asn-kent"), gI=document.getElementById("asn-grond");
  const pv=document.getElementById("asn-preview");
  const updatePreview=()=>{
    if(!pv || !rij) return;
    const {onderwerp,tekst}=asnTekst(rij);
    const aan = rij.mail ? rij.mail : "(mailadres verwerker nog onbekend — zelf invullen)";
    pv.textContent="Aan: "+aan+"\nCc: "+ASN_CC+"\nOnderwerp: "+onderwerp+"\n\n"+tekst;
  };
  if(wI) wI.oninput=()=>{ asnData.werk=wI.value; updatePreview(); };
  if(kI) kI.oninput=()=>{ asnData.kenteken=kI.value; updatePreview(); };
  if(gI) gI.onchange=()=>{ asnData.grondstof=gI.value; updatePreview(); };
  updatePreview();
  const toonFout=()=>{
    const f=valideerAsn();
    document.getElementById("asn-fout").style.display = f.length?"block":"none";
    if(wI) wI.classList.toggle("fout",f.includes("werk"));
    if(kI) kI.classList.toggle("fout",f.includes("kenteken"));
    return f.length===0;
  };
  const mailKnop=document.getElementById("asn-mail");
  if(mailKnop && rij) mailKnop.onclick=()=>{
    if(!toonFout()) return;
    const {onderwerp,tekst}=asnTekst(rij);
    window.location.href="mailto:"+encodeURIComponent(rij.mail||"")
      +"?cc="+encodeURIComponent(ASN_CC)
      +"&subject="+encodeURIComponent(onderwerp)
      +"&body="+encodeURIComponent(tekst);
  };
  const kopKnop=document.getElementById("asn-kopieer");
  if(kopKnop && rij) kopKnop.onclick=()=>{
    if(!toonFout()) return;
    const {tekst}=asnTekst(rij);
    const klaar=()=>{ state.kopieOk=true; render(); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(tekst).then(klaar).catch(()=>{ fallbackKopie(tekst); klaar(); });
    } else { fallbackKopie(tekst); klaar(); }
  };
}

function fallbackKopie(t){
  const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand("copy"); }catch(e){} document.body.removeChild(ta);
}

init();
</script>
</body>
</html>
